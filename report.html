<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Missing Person</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<header>

    <h1>HopeLink AI</h1>

    <p>Report Missing Person</p>

</header>

<div class="form-container">

    <h2>Missing Person Details</h2>

    <form action="/submit-report" method="POST" enctype="multipart/form-data">

       <label>Full Name</label>
<input type="text" name="name" placeholder="Enter Name" required>

<label>Age</label>
<input type="number" name="age" placeholder="Enter Age" required>

<label>Gender</label>
<select name="gender" required>
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
</select>

<label>Last Seen Location</label>
<input type="text" name="location" placeholder="Enter Location" required>

<label>Date Missing</label>
<input type="date" name="date" required>

<label>Upload Photo</label>
<input type="file" name="photo">

<label>Description</label>
<textarea name="description" rows="5" placeholder="Describe the missing person"></textarea>
        <button type="submit">

            Submit Report

        </button>

    </form>

</div>

</body>
</html>
